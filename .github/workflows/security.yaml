name: Security Scan

on:
  schedule:
    - cron: '0 6 * * 1'   # Every Monday at 06:00 UTC
  workflow_dispatch:        # Manual trigger

jobs:
  vulnerability-scan:
    runs-on: ubuntu-latest

    steps:
      - name: 🧾 Checkout code
        uses: actions/checkout@v4

      - name: 🧰 Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: 📦 Restore dependencies
        run: dotnet restore shell/shell.slnx
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔍 Scan for vulnerable packages
        run: |
          dotnet list shell/shell.slnx package --vulnerable --include-transitive 2>&1 | tee vuln.txt
          grep -q "has the following vulnerable packages" vuln.txt && exit 1 || exit 0
