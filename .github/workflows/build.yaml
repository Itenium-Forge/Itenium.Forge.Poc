name: Build & Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: 🧾 Checkout code
        uses: actions/checkout@v4

      - name: 🧰 Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: 📦 Restore dependencies
        run: dotnet restore shell
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔍 Scan for vulnerable packages
        run: |
          dotnet list shell package --vulnerable --include-transitive 2>&1 | tee vuln.txt
          grep -q "has the following vulnerable packages" vuln.txt && exit 1 || exit 0

      - name: 🛠️ Build
        run: dotnet build shell --no-restore --configuration Release

      - name: ✅ Run tests
        run: dotnet test shell --no-build --configuration Release --verbosity normal
